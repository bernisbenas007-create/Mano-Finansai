<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mano Finansai</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#eef3f8;
padding:20px;
color:#222;
}

.container{
max-width:750px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:25px;
color:#2e7d32;
font-size:38px;
}

.card{
background:white;
padding:20px;
border-radius:22px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

h2{
margin-bottom:15px;
color:#333;
}

input,
select,
button{
width:100%;
padding:14px;
margin-top:10px;
border-radius:14px;
border:1px solid #d7d7d7;
font-size:16px;
}

button{
background:#4CAF50;
color:white;
border:none;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#43a047;
}

.balance{
font-size:34px;
font-weight:bold;
text-align:center;
margin-top:15px;
}

.income{
color:#2e7d32;
}

.expense{
color:#c62828;
}

.transaction{
background:#f4f6f8;
padding:15px;
border-radius:16px;
margin-top:12px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.small{
font-size:14px;
color:#666;
}

.delete-btn{
background:#e53935;
width:auto;
padding:10px 14px;
font-size:14px;
}

.stats-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:15px;
}

.stat-box{
background:#f4f6f8;
padding:18px;
border-radius:18px;
text-align:center;
}

.stat-box h3{
margin-bottom:8px;
}

.empty{
text-align:center;
padding:25px;
color:#777;
}

.weekly-box{
background:#edf7ed;
padding:14px;
border-radius:14px;
margin-top:15px;
}

canvas{
margin-top:20px;
}

@media(max-width:600px){

h1{
font-size:30px;
}

.transaction{
flex-direction:column;
align-items:flex-start;
}

.delete-btn{
width:100%;
}

}

</style>
</head>

<body>

<div class="container">

<h1>💸 Mano Finansai</h1>

<div class="card">

<h2>➕ Pridėti įrašą</h2>

<input type="number" id="amount" placeholder="Suma (€)">

<select id="type" onchange="toggleCategory()">
<option value="expense">Išlaidos</option>
<option value="income">Pajamos</option>
</select>

<div id="categoryBox">

<select id="category">
<option>Maistas</option>
<option>Pramogos</option>
<option>Transportas</option>
<option>Buities prekės</option>
<option>Kita</option>
</select>

</div>

<input type="date" id="date">

<button onclick="addTransaction()">Pridėti</button>

</div>

<div class="card">

<h2>💰 Balansas</h2>

<div class="balance" id="balance">€0</div>

<div class="stats-grid">

<div class="stat-box">
<h3>Pajamos</h3>
<p id="incomeTotal">€0</p>
</div>

<div class="stat-box">
<h3>Išlaidos</h3>
<p id="expenseTotal">€0</p>
</div>

</div>

<div class="weekly-box">
📅 Savaitės išlaidų vidurkis:
<strong id="weeklyAverage">€0</strong>
</div>

</div>

<div class="card">

<h2>🎁 Savaitpinigiai</h2>

<input type="number" id="allowanceAmount" placeholder="Savaitpinigių suma (€)">

<button onclick="saveAllowance()">
Išsaugoti savaitpinigius
</button>

<p class="small" style="margin-top:10px;">
Savaitpinigiai automatiškai prisidės kas 7 dienas.
</p>

</div>

<div class="card">

<h2>📊 Išlaidų statistika</h2>

<canvas id="chart"></canvas>

</div>

<div class="card">

<h2>📝 Įrašai</h2>

<div id="transactions"></div>

</div>

</div>

<script>

let transactions =
JSON.parse(localStorage.getItem("transactions")) || [];

let allowance =
JSON.parse(localStorage.getItem("allowance")) || null;

const amountInput = document.getElementById("amount");
const dateInput = document.getElementById("date");

dateInput.valueAsDate = new Date();

function saveData(){

localStorage.setItem(
"transactions",
JSON.stringify(transactions)
);

}

function toggleCategory(){

const type =
document.getElementById("type").value;

const categoryBox =
document.getElementById("categoryBox");

if(type === "income"){
categoryBox.style.display = "none";
}else{
categoryBox.style.display = "block";
}

}

function addTransaction(){

const amount =
parseFloat(amountInput.value);

const type =
document.getElementById("type").value;

const category =
document.getElementById("category").value;

const date =
document.getElementById("date").value;

if(!amount || amount <= 0){

alert("Įvesk teisingą sumą");

return;

}

transactions.push({

amount,
type,
category: type === "income"
? "Pajamos"
: category,
date

});

saveData();

render();

amountInput.value = "";

amountInput.focus();

}

function deleteTransaction(index){

if(confirm("Ištrinti įrašą?")){

transactions.splice(index,1);

saveData();

render();

}

}

function saveAllowance(){

const amount =
parseFloat(
document.getElementById("allowanceAmount").value
);

if(!amount || amount <= 0){

alert("Įvesk teisingą sumą");

return;

}

allowance = {

amount,
lastAdded: new Date().toISOString()

};

localStorage.setItem(
"allowance",
JSON.stringify(allowance)
);

transactions.push({

amount: allowance.amount,
type: "income",
category: "Savaitpinigiai",
date: new Date().toISOString().split("T")[0]

});

saveData();

render();

alert("Savaitpinigiai pridėti!");

}

function checkAllowance(){

if(!allowance) return;

const last =
new Date(allowance.lastAdded);

const now =
new Date();

const diff =
(now - last) / (1000 * 60 * 60 * 24);

if(diff >= 7){

transactions.push({

amount: allowance.amount,
type: "income",
category: "Savaitpinigiai",
date: now.toISOString().split("T")[0]

});

allowance.lastAdded =
now.toISOString();

localStorage.setItem(
"allowance",
JSON.stringify(allowance)
);

saveData();

}

}

function render(){

const transactionsDiv =
document.getElementById("transactions");

const balanceDiv =
document.getElementById("balance");

const incomeDiv =
document.getElementById("incomeTotal");

const expenseDiv =
document.getElementById("expenseTotal");

const weeklyAverageDiv =
document.getElementById("weeklyAverage");

transactionsDiv.innerHTML = "";

if(transactions.length === 0){

transactionsDiv.innerHTML = `

<div class="empty">
Dar nėra įrašų 👀
</div>

`;

}

let income = 0;
let expense = 0;

transactions
.slice()
.reverse()
.forEach((t,index)=>{

if(t.type === "income"){
income += t.amount;
}else{
expense += t.amount;
}

transactionsDiv.innerHTML += `

<div class="transaction">

<div>

<strong>${t.category}</strong><br>

<span class="small">
${t.date}
</span><br>

<span class="${
t.type === 'income'
? 'income'
: 'expense'
}">

${t.type === 'income'
? '+'
: '-'}€${t.amount}

</span>

</div>

<button
class="delete-btn"
onclick="deleteTransaction(${transactions.length - 1 - index})">

Trinti

</button>

</div>

`;

});

const balance = income - expense;

balanceDiv.innerText =
`€${balance.toFixed(2)}`;

incomeDiv.innerText =
`€${income.toFixed(2)}`;

expenseDiv.innerText =
`€${expense.toFixed(2)}`;

const weeklyAverage =
(expense / 7).toFixed(2);

weeklyAverageDiv.innerText =
`€${weeklyAverage}`;

updateChart();

}

let chart;

function updateChart(){

const categories = {};

transactions.forEach(t=>{

if(t.type === "expense"){

if(!categories[t.category]){

categories[t.category] = 0;

}

categories[t.category] += t.amount;

}

});

const ctx =
document.getElementById("chart");

if(chart){

chart.destroy();

}

chart = new Chart(ctx, {

type: 'doughnut',

data: {

labels: Object.keys(categories),

datasets: [{

data: Object.values(categories)

}]

},

options: {

responsive:true,

plugins: {

legend: {

position:'bottom'

}

}

}

});

}

checkAllowance();

toggleCategory();

render();

if ('serviceWorker' in navigator) {

navigator.serviceWorker.register(
'service-worker.js'
);

}

</script>

</body>
</html>
